# إعدادات بناء تطبيق خافِت على Codemagic (iOS)
# التوقيع تلقائي عبر App Store Connect API (تكامل باسم KhafetASC)
workflows:
  ios-khafet:
    name: خافِت iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: KhafetASC
    environment:
      vars:
        BUNDLE_ID: "com.khafet.app"
      node: 20.19.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: تثبيت الحزم
        script: npm install
      - name: تجهيز منصة iOS
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: إنشاء وإعداد شهادات التوقيع
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: بناء ملف IPA
        script: |
          cd ios/App
          xcode-project build-ipa --workspace "App.xcworkspace" --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
