# إعدادات بناء تطبيق خافِت على Codemagic (iOS)
# التوقيع والرفع عبر متغيّرات بيئة App Store Connect (مجموعة: appstore)
workflows:
  ios-khafet:
    name: خافِت iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - appstore
      vars:
        BUNDLE_ID: "com.khafet.app"
      node: 20.19.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: تثبيت الحزم
        script: npm install
      - name: تجهيز منصة iOS
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: إنشاء وإعداد شهادات التوقيع
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: بناء ملف IPA
        script: |
          cd ios/App
          xcode-project build-ipa --workspace "App.xcworkspace" --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
