<!DOCTYPE html>
<!-- بناء 2026-07-22 — يشمل: إصلاح الحجز · حذف الحساب · خصم الحجز المبكر · خانة الاقتراحات · إزالة روابط الطاقم -->
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>خافِت | صيانة منزلية شاملة</title>
<meta name="description" content="خافِت — منصة صيانة منزلية شاملة: سباكة، كهرباء، تكييف، نجارة، دهان، أجهزة وتنظيف. احجز فني موثوق في الوقت المناسب لك." />
<link rel="icon" href="logo.png" />
<meta name="theme-color" content="#F5C518" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" media="print" onload="this.media='all'" />
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" /></noscript>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{
    /* هوية خافِت — أصفر ذهبي + فحمي دافئ */
    --gold:#F5C518; --gold-strong:#E3AF07; --gold-deep:#B8860B; --gold-soft:#FBF1C9; --gold-tint:#FDF8E7;
    --ink:#1A1712; --ink-soft:#40392E; --brand:#1A1712; --brand-dark:#000000; --brand-soft:#FBF1C9;
    --accent:#F5C518; --accent-soft:#FEF6D6;
    --bg:#FAF7EF; --card:#FFFFFF; --muted:#6E685B; --line:#EBE5D6; --line-strong:#DED6C3;
    --ok:#15803D; --ok-soft:#DCFCE7; --danger:#DC2626; --danger-soft:#FBE4E4; --warn:#B45309;
    --r:18px; --r-sm:12px; --r-lg:24px;
    --shadow:0 1px 2px rgba(40,32,10,.04), 0 10px 28px rgba(40,32,10,.06);
    --shadow-sm:0 1px 2px rgba(40,32,10,.04), 0 4px 12px rgba(40,32,10,.045);
    --shadow-gold:0 8px 26px rgba(245,197,24,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Cairo',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  .wrap{max-width:940px;margin:0 auto;padding:0 20px}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:1rem}
  h1,h2,h3{line-height:1.25;letter-spacing:-.02em;text-wrap:balance}
  .hidden{display:none !important}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--gold);color:var(--ink)}

  /* ===== Header ===== */
  header.top{position:sticky;top:0;z-index:40;background:rgba(250,247,239,.82);backdrop-filter:saturate(180%) blur(14px);border-bottom:1px solid var(--line);padding-top:env(safe-area-inset-top)}
  .top .wrap{display:flex;align-items:center;gap:12px;height:68px}
  .logo{display:flex;align-items:center;gap:11px;font-weight:900;font-size:1.4rem;color:var(--ink);letter-spacing:-.01em}
  .logo .mk{width:40px;height:40px;border-radius:13px;overflow:hidden;flex-shrink:0;box-shadow:var(--shadow-gold)}
  .logo .brand-txt{display:flex;flex-direction:column;line-height:1.08}
  .logo .brand-txt small{font-size:.6rem;font-weight:700;color:var(--muted);letter-spacing:.02em;margin-top:1px}
  .logo .mk img{width:100%;height:100%;object-fit:cover;display:block}
  .spacer{flex:1}
  .hbtn{display:flex;align-items:center;gap:7px;padding:9px 15px;border-radius:12px;font-weight:700;font-size:.92rem;transition:.18s}
  .hbtn.solid{background:var(--gold);color:var(--ink)}
  .hbtn.solid:hover{background:var(--gold-strong)}
  .hbtn.ghost{background:transparent;color:var(--muted)}
  .hbtn.ghost:hover{background:rgba(0,0,0,.05);color:var(--ink)}
  .hbtn .badge{background:var(--ink);color:#fff;border-radius:999px;min-width:20px;height:20px;padding:0 6px;font-size:.75rem;display:grid;place-items:center}
  /* اختيار الموقع */
  .loc-chip{display:inline-flex;align-items:center;gap:6px;background:var(--gold-tint);border:1px solid var(--gold-soft);border-radius:999px;padding:8px 13px;font-weight:800;font-size:.9rem;color:var(--ink);max-width:170px}
  .loc-chip #locCity{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .loc-chip .chev{color:var(--muted);font-size:.8rem}
  .loc-modal{position:fixed;inset:0;z-index:75;background:rgba(20,18,10,.5);backdrop-filter:blur(2px);display:none;align-items:flex-end;justify-content:center}
  .loc-modal.show{display:flex}
  .loc-sheet{background:var(--card);width:100%;max-width:560px;max-height:88vh;overflow-y:auto;border-radius:22px 22px 0 0;padding:20px}
  .loc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .loc-head b{font-size:1.2rem;font-weight:900}
  .loc-head button{width:36px;height:36px;border-radius:50%;background:var(--bg);font-size:1.1rem}
  .loc-sheet .hint{color:var(--muted);font-size:.9rem;margin-bottom:14px}
  .loc-gps{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--ink);color:#fff;font-weight:800;padding:14px;border-radius:13px;margin-bottom:14px}
  .loc-cities{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
  .loc-cities button{padding:13px 8px;border-radius:12px;border:1.5px solid var(--line);background:#fcfbf6;font-weight:800;font-size:.92rem;transition:.12s}
  .loc-cities button:hover{border-color:var(--gold)}
  .loc-cities button.on{background:var(--gold);border-color:var(--gold);color:var(--ink)}
  .loc-other{display:flex;gap:8px;margin-top:14px}
  .loc-other input{flex:1;padding:13px 15px;border:1.5px solid var(--line);border-radius:12px;background:#fcfbf6}
  .loc-other button{background:var(--gold);color:var(--ink);font-weight:900;padding:0 20px;border-radius:12px}

  /* ===== Hero ===== */
  .hero{background:linear-gradient(158deg,#F9D338 0%,#F5C518 52%,#EFBC0C 100%);color:var(--ink);position:relative;overflow:hidden}
  .hero::before{content:"";position:absolute;inset:0;background:radial-gradient(120% 90% at 85% -10%, rgba(255,255,255,.35), transparent 55%);pointer-events:none}
  .hero-in{padding:44px 20px 48px;text-align:center;position:relative;z-index:1}
  .hero-mark{width:74px;height:74px;margin:0 auto 14px;color:var(--ink)}
  .hero-logo{display:inline-block;width:92px;height:92px;border-radius:24px;overflow:hidden;margin-bottom:14px;box-shadow:0 10px 26px rgba(0,0,0,.14);background:#fff}
  .hero-logo img{width:100%;height:100%;object-fit:cover;display:block}
  .hero h1{font-size:2.15rem;font-weight:900;letter-spacing:-.035em}
  .hero p{font-size:1.05rem;max-width:460px;margin:9px auto 0;color:var(--ink-soft);font-weight:600}
  .hero-sub b{display:block;font-size:1.18rem;font-weight:900;color:var(--ink)}
  .hero-sub span{display:block;font-size:.98rem;font-weight:600;color:var(--ink-soft);margin-top:3px}
  /* هيرو مختصر */
  .hero-slim .hero-in{padding:30px 20px 34px}
  .hero.hero-slim h1{font-size:2rem}
  .hero-slim p{margin-top:5px}
  .hero-wave{display:block;width:100%;height:22px;color:var(--bg);position:relative;z-index:1}

  /* ===== Layout ===== */
  section{margin-top:34px}
  .sec-head{margin-bottom:16px}
  .sec-head h2{font-size:1.35rem;font-weight:900}
  .sec-head p{color:var(--muted);font-size:.92rem;margin-top:2px}

  .features{display:flex;justify-content:center;flex-wrap:wrap;gap:8px 22px;margin-top:22px;color:var(--muted);font-size:.9rem;font-weight:600}
  .features span{display:inline-flex;gap:6px;align-items:center}

  /* Category tiles */
  .ctiles{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .ctile{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:22px 14px;text-align:center;box-shadow:var(--shadow-sm);transition:.18s}
  .ctile:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:var(--gold)}
  .ct-ic{width:58px;height:58px;margin:0 auto 12px;border-radius:16px;background:var(--gold-soft);display:grid;place-items:center;font-size:1.7rem}
  .ctile b{display:block;font-size:1.05rem;font-weight:800}
  .ctile small{color:var(--muted);font-size:.82rem}

  /* Popular row */
  .popular{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:14px 12px;text-align:center;transition:.15s;position:relative;box-shadow:var(--shadow-sm)}
  .pcard:hover{border-color:var(--gold);transform:translateY(-3px)}
  .pcard .pic{font-size:1.7rem}
  .pcard b{display:block;font-size:.92rem;margin-top:4px}
  .pcard small{color:var(--muted);font-size:.76rem}
  .pcard .padd{position:absolute;top:8px;left:8px;width:34px;height:34px;border-radius:50%;background:var(--gold);color:var(--ink);font-weight:900;display:grid;place-items:center;font-size:1.2rem}

  /* Loyalty slim */
  .loystrip{display:flex;align-items:center;gap:14px;background:var(--gold-soft);border:1px solid #F1E3A8;border-radius:var(--r);padding:15px 18px}
  .loystrip .ls-ic{font-size:1.7rem}
  .loystrip .ls-txt{flex:1;font-size:.95rem;font-weight:600}
  .loystrip .ls-txt b{font-weight:800}
  .loystrip .ls-count{font-weight:900;font-size:1.15rem;background:#fff;border:1px solid #F1E3A8;padding:6px 13px;border-radius:999px;white-space:nowrap}

  /* Service cards */
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .scard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;transition:.15s}
  .scard:hover{box-shadow:var(--shadow);border-color:#e3ddc9}
  .scard .stop{display:flex;gap:13px;align-items:flex-start}
  .scard .sico{width:50px;height:50px;border-radius:15px;background:var(--gold-soft);display:grid;place-items:center;font-size:1.6rem;flex-shrink:0}
  .scard .sinfo{flex:1}
  .scard .scat{font-size:.74rem;color:var(--muted);font-weight:700}
  .scard h3{font-size:1.05rem;font-weight:800;margin-top:1px}
  .scard .sdesc{color:var(--muted);font-size:.9rem;margin-top:3px;min-height:36px}
  .scard .meta{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
  .pill{font-size:.79rem;font-weight:700;padding:6px 11px;border-radius:999px;display:inline-flex;gap:5px;align-items:center}
  .pill.time{background:#f3f1e9;color:#5c5a50}
  .pill.price{background:var(--gold-soft);color:#7a5f00}
  .scard .add{margin-top:15px;background:var(--ink);color:#fff;font-weight:800;padding:12px;border-radius:13px;transition:.15s;display:flex;align-items:center;justify-content:center;gap:7px}
  .scard .add:hover{background:#000}
  .scard .add.in{background:var(--ok)}

  /* Floating cart */
  .cartbar{position:fixed;bottom:0;left:0;right:0;z-index:45;background:var(--ink);color:#fff;box-shadow:0 -8px 24px rgba(0,0,0,.18);transform:translateY(120%);transition:.25s}
  .cartbar.show{transform:translateY(0)}
  .cartbar .wrap{display:flex;align-items:center;gap:14px;height:68px}
  .cartbar .ci{background:rgba(255,255,255,.14);width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-size:1.2rem;position:relative}
  .cartbar .ci b{position:absolute;top:-6px;left:-6px;background:var(--gold);color:var(--ink);border-radius:999px;min-width:20px;height:20px;font-size:.72rem;display:grid;place-items:center;padding:0 5px}
  .cartbar .cinfo{flex:1;line-height:1.35}
  .cartbar .cinfo b{font-size:1.02rem}
  .cartbar .cinfo small{opacity:.8;display:block;font-size:.82rem}
  .cartbar .cgo{background:var(--gold);color:var(--ink);font-weight:900;padding:12px 22px;border-radius:13px;display:flex;gap:7px;align-items:center}

  /* ===== Sub screens ===== */
  .screen{min-height:60vh;padding-bottom:30px}
  .pagehead{display:flex;align-items:center;gap:13px;margin:22px 0 4px}
  .back{width:44px;height:44px;border-radius:13px;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;font-size:1.2rem;box-shadow:var(--shadow-sm);transition:.15s}
  .back:hover{background:#f4f2ea}
  .pagehead h2{font-size:1.5rem;font-weight:900;letter-spacing:-.02em}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:22px;margin-top:16px}
  .panel h3{font-size:1.05rem;font-weight:800;margin-bottom:15px;display:flex;align-items:center;gap:8px;letter-spacing:-.01em}

  /* Cart lines */
  .cline{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--line)}
  .cline:last-child{border-bottom:none}
  .cline .ci2{width:46px;height:46px;border-radius:13px;background:var(--gold-soft);display:grid;place-items:center;font-size:1.4rem;flex-shrink:0}
  .cline .cn{flex:1}
  .cline .cn b{font-size:.98rem}
  .cline .cn small{color:var(--muted);display:block;font-size:.8rem}
  .qty{display:flex;align-items:center;background:#f4f2ea;border-radius:11px;overflow:hidden}
  .qty button{width:34px;height:36px;font-weight:900;font-size:1.15rem}
  .qty span{min-width:28px;text-align:center;font-weight:800}
  .del{color:var(--danger);font-size:1.15rem;padding:6px}
  .totals{display:flex;flex-direction:column;gap:9px}
  .totals .row{display:flex;justify-content:space-between;align-items:center}
  .totals .row.big{font-size:1.18rem;font-weight:900;border-top:2px dashed var(--line);padding-top:13px;margin-top:4px}
  .totals .muted{color:var(--muted)}
  .est{background:var(--gold-soft);border:1px solid #F1E3A8;border-radius:var(--r-sm);padding:14px 16px;display:flex;gap:12px;align-items:center;margin-top:16px}
  .est .big{font-size:1.08rem;font-weight:800}

  /* Forms */
  .field{margin-bottom:15px}
  .field label{display:block;font-weight:700;font-size:.9rem;margin-bottom:7px}
  .field label .req{color:var(--danger)}
  .field input,.field textarea,.field select{width:100%;padding:13px 15px;border:1.5px solid var(--line);border-radius:12px;background:#FCFBF6;transition:.15s}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--gold-strong);background:#fff;box-shadow:0 0 0 3px var(--accent-soft)}
  .field textarea{resize:vertical;min-height:72px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}

  /* Date chips */
  .dates{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none}
  .dates::-webkit-scrollbar{display:none}
  .dchip{flex-shrink:0;min-width:76px;text-align:center;padding:11px 8px;border-radius:15px;border:1.5px solid var(--line);background:#fcfbf7;transition:.15s}
  .dchip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .dchip small{display:block;font-size:.72rem;opacity:.85}
  .dchip b{font-size:1.3rem;display:block;font-weight:800}
  .dchip .mon{font-size:.72rem}
  .more-date{position:relative;border-style:dashed;border-color:var(--gold-strong);background:var(--gold-tint);cursor:pointer;display:block}
  .more-date b{color:var(--gold-deep,#B8860B)}
  .more-date.active{border-style:solid;background:var(--ink);color:#fff;border-color:var(--ink)}
  .more-date.active b{color:#fff}
  .more-date input[type=date]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;border:none;padding:0}

  /* Time slots */
  .slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(132px,1fr));gap:10px;margin-top:4px}
  .slot{padding:12px 6px;border-radius:13px;border:1.5px solid var(--line);background:#fcfbf7;font-weight:700;text-align:center;transition:.15s;font-size:.9rem}
  .slot.win{white-space:nowrap;font-size:.88rem;font-weight:800}
  .slot.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .slot:disabled{opacity:.35;text-decoration:line-through;cursor:not-allowed}
  .slot-note{color:var(--muted);font-size:.83rem;margin-top:10px;display:flex;gap:6px;align-items:flex-start}
  .notify-toggle{display:flex;align-items:center;gap:12px;margin-top:14px;background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:14px 16px;cursor:pointer;transition:.15s}
  .notify-toggle.on{border-color:#25D366;background:rgba(37,211,102,.1)}
  .notify-toggle .nt-check{width:26px;height:26px;flex-shrink:0;border-radius:8px;border:2px solid var(--line);display:grid;place-items:center;font-weight:900;color:#fff;font-size:1rem}
  .notify-toggle.on .nt-check{background:#25D366;border-color:#25D366}
  .notify-toggle .nt-t b{display:block;font-weight:800;font-size:.98rem;color:var(--ink)}
  .notify-toggle .nt-t small{color:var(--muted);font-size:.82rem}
  .reject-note{display:flex;align-items:center;gap:11px;background:rgba(248,113,113,.1);border:1.5px solid rgba(248,113,113,.45);border-radius:var(--r-sm);padding:12px 14px;margin-top:12px}
  .reject-note .rj-ic{font-size:1.3rem;line-height:1}
  .reject-note .rj-t{display:flex;flex-direction:column;font-size:.86rem;color:#a3352f;font-weight:700;line-height:1.4}
  .reject-note .rj-t b{font-size:.98rem;color:#8a201b;font-weight:900}
  .delay-note{display:flex;align-items:center;gap:11px;background:rgba(255,149,0,.1);border:1.5px solid rgba(255,149,0,.45);border-radius:var(--r-sm);padding:12px 14px;margin-top:12px}
  .delay-note .dn-ic{font-size:1.4rem;line-height:1}
  .delay-note .dn-t{display:flex;flex-direction:column;font-size:.84rem;color:#b26a00;font-weight:700;line-height:1.4}
  .delay-note .dn-t b{font-size:.98rem;color:#8a4b00;font-weight:900}
  .advance-note{display:flex;align-items:center;gap:11px;background:var(--gold-tint);border:1.5px solid var(--gold-strong);border-radius:var(--r-sm);padding:12px 14px;margin-top:12px}
  .advance-note .an-ic{font-size:1.5rem;line-height:1}
  .advance-note .an-t{flex:1;display:flex;flex-direction:column;font-size:.82rem;color:#7a5f00;font-weight:700;line-height:1.35}
  .advance-note .an-t b{font-size:.98rem;color:var(--ink);font-weight:900}
  .advance-note .an-btn{background:var(--ink);color:#fff;border:none;border-radius:10px;padding:10px 15px;font-weight:900;font-size:.9rem;cursor:pointer;white-space:nowrap;font-family:inherit}
  .advance-note .an-btn:active{transform:scale(.97)}

  .cta{width:100%;background:var(--ink);color:#fff;font-weight:900;font-size:1.05rem;padding:17px;border-radius:15px;transition:.2s cubic-bezier(.2,.7,.3,1);display:flex;align-items:center;justify-content:center;gap:9px;letter-spacing:-.01em;box-shadow:0 8px 22px rgba(26,23,18,.22)}
  .cta:hover{background:#000;transform:translateY(-2px);box-shadow:0 12px 28px rgba(26,23,18,.28)}
  .cta:disabled{opacity:.35;cursor:not-allowed;box-shadow:none;transform:none}
  .cta.gold{background:var(--gold);color:var(--ink);box-shadow:var(--shadow-gold)}
  .cta.gold:hover{background:var(--gold-strong)}

  /* Confirmation */
  .success{text-align:center;padding:18px 0}
  .success .circle{width:94px;height:94px;border-radius:50%;background:var(--gold-soft);display:grid;place-items:center;font-size:3rem;margin:0 auto 14px;animation:pop .4s}
  @keyframes pop{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
  .success h2{font-size:1.5rem;font-weight:900}
  .success .ordno{display:inline-block;background:var(--gold-soft);color:#7a5f00;font-weight:800;padding:6px 17px;border-radius:999px;margin-top:8px}
  .kv{display:flex;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);font-size:.95rem}
  .kv:last-child{border-bottom:none}
  .kv b{font-weight:800;text-align:left}
  .reminder-note{background:var(--gold-soft);border:1px solid #F1E3A8;border-radius:var(--r-sm);padding:13px 15px;display:flex;gap:10px;color:#7a5f00;font-weight:600;margin-top:15px;font-size:.9rem}
  .rate-box{margin-top:14px;padding-top:14px;border-top:1px dashed var(--line)}
  .rate-row{display:flex;align-items:center;gap:10px}
  .rate-lbl{font-weight:800;color:var(--ink)}

  /* My bookings */

  .st-progress{background:#FEF0C7;color:#92600A}

  .sbtn{padding:10px 15px;border-radius:11px;font-weight:700;font-size:.86rem;border:1.5px solid var(--line);background:#fff;transition:.15s}

  .fb-saved{margin-top:10px;background:#f6f4ec;border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 14px;color:var(--ink-soft);font-weight:600;font-size:.92rem}

  .cust-invoice{margin-top:13px;background:var(--gold-tint);border:1px solid var(--gold-soft);border-radius:13px;padding:13px 15px}
  .cust-invoice .ci-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}

  .empty{text-align:center;padding:56px 20px;color:var(--muted)}

  /* ===== Admin ===== */
  .admin-bar{background:var(--ink);color:#fff;border-radius:var(--r);padding:18px 20px;display:flex;align-items:center;gap:13px;margin-top:16px}

  /* ===== Simple guided flow ===== */

  .join-link{display:inline-block;color:var(--ink);font-weight:800;font-size:.9rem;background:var(--gold-tint);border:1px solid var(--gold-soft);padding:11px 18px;border-radius:999px;cursor:pointer;transition:.15s}

/* ============================================================
   السحابة (Supabase) — الطلبات تتزامن بين كل الأجهزة لحظياً
   لو ما توفّر اتصال/مكتبة: يشتغل الموقع محلياً بدون مشاكل
   ============================================================ */
let sb=null, cloudReady=false, cloudFails=0, cloudLoading=false;
/* هوية مجهولة للعميل — تربط طلباته بجهازه بدون ما يسجّل حساب.
   بدونها ما نقدر نقفل قاعدة البيانات (لأن الخادم ما يعرف مين صاحب الطلب). */
let myUid=null;
let isVerified=false;   // سجّل برقمه عبر الرمز؟ (يحدّد هل نقاطه تتبعه لأي جهاز)
async function ensureAnonSession(){
  if(!sb) return null;
  try{
    const { data:{ session } } = await sb.auth.getSession();
    if(session && session.user){
      myUid=session.user.id;
      isVerified = !session.user.is_anonymous;
      return myUid;
    }
    const { data, error } = await sb.auth.signInAnonymously();
    if(!error && data && data.user){ myUid=data.user.id; isVerified=false; }
  }catch(e){ console.warn('anon auth:', e.message||e); }
  return myUid;
}
async function initCloud(){
  if(cloudReady) return;
  try{
    if(window.supabase && SUPABASE_URL && SUPABASE_ANON && !/YOUR_/.test(SUPABASE_URL)){
      sb=window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
      cloudReady=true;
      await ensureAnonSession();
      loadPrices();
      loadArticles();
      loadBusy();
      loadOrdersFromCloud();
      loadMyRef().then(()=>{ if(['account','info','home'].includes(view)) render(); });  // كودي ورصيدي
      subscribeCloud();
      initPush();          // إشعارات التطبيق (تعمل داخل التطبيق فقط، تُتجاهل على المتصفح)
    }
  }catch(e){ cloudReady=false; }
}

/* ---------- إشعارات التطبيق (Push) ----------
   تشتغل بس لما الموقع يكون داخل تطبيق Capacitor.
   على المتصفح العادي ما يصير شي — بدون أي خطأ. */
function inApp(){ return !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()); }

/* حالة الإشعارات — تُعرض بصفحة «حسابي» عشان نشخّص بدون أدوات مطوّر */
let pushState='—';
function setPushState(s){ pushState=s; if(view==='account') renderAccount(); }

/* الطريقة الصحيحة للوصول لإضافة أصلية بدون حزم JS:
   Capacitor.registerPlugin — أما Capacitor.Plugins فطريقة قديمة قد لا تعمل بالإصدار ٦. */
function getPushPlugin(){
  const C=window.Capacitor;
  if(!C) return null;
  try{ if(typeof C.registerPlugin==='function') return C.registerPlugin('PushNotifications'); }catch(e){}
  return (C.Plugins && C.Plugins.PushNotifications) || null;
}
let _pn=null, _pnReady=false;
async function initPush(){
  if(!inApp()){ setPushState('متصفح — الإشعارات للتطبيق فقط'); return; }
  try{
    const PN = _pn || getPushPlugin();
    if(!PN){ setPushState('❌ إضافة الإشعارات غير مثبّتة'); return; }
    _pn = PN;
    if(_pnReady) return void registerNow(PN);   // المستمعات مركّبة — أعد الطلب فقط

    // ⚠️ لازم *ننتظر* تركيب المستمعات قبل register — وإلا يوصل ردّ آبل وما فيه أحد يسمعه
    await PN.addListener('registration', async (t)=>{
      try{
        // انتظر الهوية — القفل يرفض أي كتابة بلا auth.uid()
        for(let i=0; i<20 && !myUid; i++){ await ensureAnonSession(); if(!myUid) await new Promise(r=>setTimeout(r,300)); }
        if(!myUid){ setPushState('❌ تعذّر تجهيز الهوية — حدّث الصفحة'); return; }
        // التسجيل عبر دالة الخادم (تفرض auth.uid() بنفسها) — أوثق من الكتابة المباشرة
        const { data, error } = await sb.rpc('register_device', { p_token: t.value, p_platform: 'ios' });
        if(error) throw error;
        if(!data || data.ok !== true) throw new Error(data && data.reason ? data.reason : 'رفض الخادم');
        setPushState('✅ الجهاز مسجّل — الإشعارات شغّالة');
      }catch(e){
        console.error('device save:', e);
        setPushState('❌ فشل الحفظ: '+(e.message||e.hint||e.details||JSON.stringify(e)));
      }
    });
    await PN.addListener('registrationError', e=> setPushState('❌ رفضتها آبل: '+JSON.stringify(e)));
    await PN.addListener('pushNotificationActionPerformed', ()=>{ go('mybookings'); });
    _pnReady = true;
    await registerNow(PN);
  }catch(e){ setPushState('❌ خطأ: '+(e.message||e)); }
}
async function registerNow(PN){
  try{
    let perm = await PN.checkPermissions();
    if(perm.receive === 'prompt' || perm.receive === 'prompt-with-rationale') perm = await PN.requestPermissions();
    if(perm.receive !== 'granted'){ setPushState('⚠️ الإذن مرفوض ('+perm.receive+') — فعّله من إعدادات الآيفون'); return; }
    setPushState('⏳ نسجّل الجهاز…');
    await PN.register();
    // لو آبل ما ردّت خلال ١٥ ثانية، قل ذلك بدل ما تعلّق للأبد
    setTimeout(()=>{ if(pushState.indexOf('⏳')===0) setPushState('⚠️ آبل ما ردّت — تأكد من الإنترنت واضغط «أعد المحاولة»'); }, 15000);
  }catch(e){ setPushState('❌ خطأ بالتسجيل: '+(e.message||e)); }
}

/* رفع مقطع الفيديو إلى Supabase Storage وإرجاع رابطه العام */
/* ---------- وسائط العملاء (صور/فيديو المنزل) ----------
   نخزّن *المسار* مو رابطاً عاماً. الرابط يُولَّد موقّعاً وينتهي بعد دقائق،
   فما أحد يقدر يتصفّح صور بيوت العملاء حتى لو حصل على الرابط لاحقاً. */
async function uploadVideo(file){
  const ext=(file.name.split('.').pop()||'mp4').toLowerCase();
  // اسم طويل عشوائي — ما يُخمّن
  const rnd=(crypto.randomUUID?crypto.randomUUID():Math.random().toString(36).slice(2)+Math.random().toString(36).slice(2)).replace(/-/g,'');
  const path='v_'+Date.now()+'_'+rnd+'.'+ext;
  const { error } = await sb.storage.from('khafet-videos').upload(path, file, {upsert:false, contentType:file.type||'video/mp4'});
  if(error) throw error;
  return path;   // ← المسار، مو الرابط
}
/* يقبل المسار الجديد أو الرابط العام القديم */
function mediaPath(v){
  if(!v) return '';
  const s=String(v);
  const m=s.match(/khafet-videos\/(.+?)(\?|$)/);
  return m ? decodeURIComponent(m[1]) : s;
}
async function openMedia(v){
  const p=mediaPath(v);
  if(!p || !sb){ toast('تعذّر فتح الملف'); return; }
  try{
    const { data, error } = await sb.storage.from('khafet-videos').createSignedUrl(p, 600);  // ١٠ دقائق
    if(error || !data) throw error || new Error('no url');
    window.open(data.signedUrl, '_blank', 'noopener');
  }catch(e){ console.warn('media:', e.message||e); toast('تعذّر فتح الملف'); }
}
async function loadOrdersFromCloud(){
  if(!cloudReady || cloudLoading) return;
  cloudLoading=true;
  try{
    // اقصرها على طلبات صاحب الحساب صراحةً — لا نتّكل على RLS وحدها
    // (لو كان الحساب من الطاقم، RLS تسمح له بالكل وما نبي تختلط طلبات غيره هنا)
    let qy = sb.from('khafet_orders').select('*').order('created_at',{ascending:false});
    if(myUid) qy = qy.eq('user_id', myUid);
    const { data, error } = await qy;
    if(error) throw error;
    cloudFails=0;
    state.orders = (data||[]).map(rowToOrder);
    save();
    if(['home','tech','admin','mybookings'].includes(view)) render();
  }catch(e){
    cloudFails++;
    if(cloudFails===1) console.warn('Supabase load failed:', e.message||e);
    if(cloudFails>=3){

function phoneLoyalty(phone){
  if(!phone) return {done:0, progress:0, freeAvailable:0};
  const mine=state.orders.filter(o=>o.customer && o.customer.phone===phone && o.status==='done' && o.status!=='cancelled');
  const paidDone=mine.filter(o=>!o.free).length;   // كل طلب مكتمل (سريع أو عادي) يُحسب
  const freeDone=mine.filter(o=>o.free).length;
  const earned=Math.floor(paidDone/LOYALTY_TARGET);
  return {done:paidDone, progress:paidDone%LOYALTY_TARGET, freeAvailable:Math.max(0, earned-freeDone)};
}
/* نقاط الولاء = طلبات *هذه الهوية* المنجزة.
   القفل يضمن إن state.orders فيها طلبات هذا العميل فقط، فالعدّ عليها مباشرة
   أدقّ من المطابقة بالجوال — اللي كانت تنكسر بعد القفل (كل جهاز يشوف هويته فقط).
   ولما يسجّل بالرمز تنربط أجهزته بهوية وحدة وتتجمّع نقاطه تلقائياً. */
/* الولاء: كل ٦ طلبات عادية منجزة → الطلب التالي يُخصم منه متوسط أسعار طلباته.
   المكافأة (طلب فيه خصم ولاء، أو طلب مجاني قديم) لا تُحسب ضمن الـ٦. */
function myLoyalty(){
  const mine=state.orders.filter(o=>o.status==='done');
  const isReward=o=> o.free || (+o.loyaltyDisc>0);
  const regs=mine.filter(o=>!isReward(o));
  const rewardDone=mine.filter(isReward).length;
  const paidDone=regs.length;
  const earned=Math.floor(paidDone/LOYALTY_TARGET);
  const avg=regs.length ? Math.round(regs.reduce((a,o)=>a+(+o.price||0),0)/regs.length) : 0;
  return { done:paidDone, progress:paidDone%LOYALTY_TARGET,
           rewardAvailable: Math.max(0, earned-rewardDone)>0, rewardAmount: avg };
}

  const L=myLoyalty();
  return L.rewardAvailable ? Math.min(L.rewardAmount, cartPrice()) : 0;
}

/* الجدول المشغول الحقيقي — كل عملاء المنصة، مو بس هذا الجهاز.
   بدونه كان عميلان يحجزان نفس الوقت والفني يتأخر. البيانات: يوم/وقت/مدة/مدينة فقط. */
let BUSY=[], busyAt=0;
async function loadBusy(){
  if(!cloudReady||!sb) return false;
  if(Date.now()-busyAt<60000) return false;   // كاش دقيقة
  busyAt=Date.now();
  try{
    const { data }=await sb.rpc('khafet_busy_times');
    if(Array.isArray(data)){ BUSY=data.map(r=>({date:r.d,start:r.s,dur:r.m||60,city:(r.c||'').trim()})); return true; }
  }catch(e){}
  return false;
}
function slotAvailable(iso,startMin,needMin,excludeId){
  if(isOffDay(iso)) return false;              // إجازة — ما فيه مواعيد
  const end=startMin+needMin+BUFFER;
  if(end-BUFFER>WORK_END) return false;
  const now=new Date();
  if(iso===dateISO(now)){
    const nowMin=now.getHours()*60+now.getMinutes();
    // النافذة تبقى مفتوحة طالما ما انتهت (حسب نهايتها مو بدايتها) — تقفل عند وصول وقتها النهائي
    if(nowMin >= startMin + ARRIVAL_WINDOW) return false;
  }
  // ندمج حجوزات هذا الجهاز مع الجدول الحقيقي لكل العملاء
  const ex=excludeId?state.orders.find(o=>o.id===excludeId):null;
  const myCity=((state.address&&state.address.city)||'').trim();
  let exSkipped=false;
  const cloud=BUSY.filter(b=>b.date===iso).filter(b=>{
    if(ex && !exSkipped && b.start===ex.startMin){ exSkipped=true; return false; }   // الطلب الجاري تعديله
    if(b.city && myCity && b.city!==myCity) return false;                            // مدينة ثانية = فريق ثاني
    return true;
  });
  const seen=new Set(cloud.map(b=>b.start));
  const local=bookingsOn(iso,excludeId).map(o=>({start:o.startMin,dur:o.duration||60}))
    .filter(o=>!seen.has(o.start));   // طلباتي موجودة بالجدولين — بلا تكرار
  const all=cloud.concat(local);
  if(all.length >= MAX_JOBS_PER_DAY) return false;   // اليوم ممتلئ
  for(const o of all){
    const oEnd=o.start+o.dur+BUFFER;
    if(startMin<oEnd && end>o.start) return false;
  }
  return true;
}

   تطبيق ثانٍ مثل واتساب للدخول (Guideline 4.2.3). للرجوع لواتساب، غيّرها لـ'whatsapp'. */
const OTP_CHANNEL='sms';
/* حساب مراجعة آبل: يُجبَر على مسار الدخول المباشر (لا «تغيير رقم») ليقبل
   الرمز التجريبي الثابت المضبوط في Supabase → Auth → Phone → Test OTP. */
const DEMO_PHONE='+966500000000';
let otpStep=false, otpPhone='', otpMode='';   // otpMode: 'link' | 'signin'

/* 05xxxxxxxx → +9665xxxxxxxx */
function normPhone(p){
  let d=String(p||'').replace(/[^0-9]/g,'');
  if(d.startsWith('00966')) d=d.slice(2);
  else if(d.startsWith('966')) { /* كما هو */ }
  else if(d.startsWith('0')) d='966'+d.slice(1);
  else if(d.startsWith('5')) d='966'+d;
  return '+'+d;
}
function renderLogin(){
  const ph=(state.customer&&state.customer.phone)||'';
  const chName = OTP_CHANNEL==='whatsapp' ? 'واتساب' : 'رسالة نصية';
  const chIco  = OTP_CHANNEL==='whatsapp' ? '💬' : '📩';
  const body = otpStep ? `
      <h3>${chIco} رمز التحقق</h3>
      <p style="color:var(--muted);font-size:.9rem;margin:4px 0 12px">أرسلنا رمزاً إلى <b dir="ltr">${esc(otpPhone)}</b></p>
      <div class="field"><label>الرمز</label><input id="lg_otp" inputmode="numeric" maxlength="6" placeholder="------" style="letter-spacing:.5em;text-align:center;font-weight:900" onkeydown="if(event.key==='Enter')verifyOtpCode()" /></div>
      <button class="cta" onclick="verifyOtpCode()">تأكيد ودخول</button>
      <button class="ghost" style="width:100%;margin-top:8px" onclick="otpStep=false;render()">← تغيير الرقم</button>`
    : `
      <h3>👤 حسابي</h3>
      <p style="color:var(--muted);font-size:.9rem;margin:4px 0 12px">أدخل رقم جوالك ويوصلك رمز عبر <b>${chName}</b></p>
      <div class="field"><label>رقم الجوال</label><input id="lg_cust_phone" value="${esc(ph)}" inputmode="tel" placeholder="05xxxxxxxx" onkeydown="if(event.key==='Enter')sendOtp()" /></div>
      <button class="cta" onclick="sendOtp()">${chIco} أرسل الرمز عبر ${chName}</button>`;
  document.getElementById('app').innerHTML=`
    <div class="wrap screen">
      ${pageHead('تسجيل الدخول','home')}
      <div class="panel" style="margin-top:14px">${body}</div>
      <div style="height:24px"></div>
    </div>`;
}
async function sendOtp(){
  const raw=((document.getElementById('lg_cust_phone')||{}).value||'').trim();
  const phone=normPhone(raw);
  if(!/^\+9665\d{8}$/.test(phone)){ toast('اكتب رقم جوال سعودي صحيح (05xxxxxxxx)'); return; }
  if(!cloudReady){ toast('لا يوجد اتصال بالخادم'); return; }
  const btn=document.querySelector('.panel .cta'); if(btn){ btn.disabled=true; btn.textContent='⏳ نرسل الرمز...'; }
  otpPhone=phone;
  try{
    const { data:{ user } } = await sb.auth.getUser();
    // حساب المراجعة يتخطّى ربط الهوية المجهولة، ويدخل مباشرة ليقبل الرمز التجريبي
    if(user && user.is_anonymous && phone!==DEMO_PHONE){
      // اربط الرقم بالهوية الحالية → طلباته السابقة تنتقل معه
      const { error } = await sb.auth.updateUser({ phone });
      if(!error){ otpMode='link'; otpStep=true; render(); return; }
    }
    // رقم مسجّل من قبل (أو جهاز جديد) → دخول عادي
    const { error } = await sb.auth.signInWithOtp({ phone, options:{ channel:OTP_CHANNEL } });
    if(error) throw error;
    otpMode='signin'; otpStep=true; render();
  }catch(e){
    console.warn('otp send:', e.message||e);
    toast('تعذّر إرسال الرمز — تأكد من الرقم وحاول مرة ثانية');
    otpStep=false; render();   // أعد بناء الشاشة (الزر يرجع لنصه الصحيح)
  }
}
async function verifyOtpCode(){
  const token=((document.getElementById('lg_otp')||{}).value||'').trim();
  if(!/^\d{4,8}$/.test(token)){ toast('اكتب الرمز المرسل'); return; }
  const btn=document.querySelector('.panel .cta'); if(btn){ btn.disabled=true; btn.textContent='⏳...'; }
  try{
    const { error } = await sb.auth.verifyOtp({
      phone: otpPhone, token,
      type: otpMode==='link' ? 'phone_change' : 'sms'
    });
    if(error) throw error;
    const { data:{ user } } = await sb.auth.getUser();
    if(user){ myUid=user.id; isVerified=true; }
    state.customer=state.customer||{};
    state.customer.phone=(document.getElementById('lg_cust_phone')||{}).value || state.customer.phone || otpPhone;
    save();
    otpStep=false;
    await loadOrdersFromCloud();
    toast('أهلاً بك 👋'); go('account');
  }catch(e){
    console.warn('otp verify:', e.message||e);
    toast('الرمز غير صحيح أو انتهت صلاحيته');
    if(btn){ btn.disabled=false; btn.textContent='تأكيد ودخول'; }
  }
}

async function confirmDeleteAccount(){
  if(!confirm('تأكيد أخير — سيُحذف حسابك وكل بياناتك نهائياً. متابعة؟')) return;
  const btn=document.getElementById('delGo'); if(btn){ btn.disabled=true; btn.textContent='⏳ جارٍ الحذف…'; }
  try{
    if(!sb) throw new Error('لا يوجد اتصال بالإنترنت');
    const { data:{ session } }=await sb.auth.getSession();
    if(!session) throw new Error('انتهت الجلسة — سجّل الدخول وأعد المحاولة');
    const r=await fetch(SUPABASE_URL+'/functions/v1/delete-account',{ method:'POST',
      headers:{ apikey:SUPABASE_ANON, Authorization:'Bearer '+session.access_token, 'Content-Type':'application/json' },
      body:'{}' });
    const d=await r.json().catch(()=>({}));
    if(!d.ok) throw new Error(d.error||'تعذّر حذف الحساب');
    try{ await sb.auth.signOut(); }catch(e){}
    myUid=null; isVerified=false;
    state.customer={}; state.address={}; state.myOrderIds=[]; state.orders=[]; state.cart={}; state.promo='';
    myRef={ code:null, balance:0, referrals:0 };
    save(); closeDeleteAccount();
    try{ await ensureAnonSession(); }catch(e){}

    go('home');
  }catch(e){
    if(btn){ btn.disabled=false; btn.textContent='نعم، احذف حسابي نهائياً'; }

}

/* ---- اختيار الموقع (المدينة) ---- */
const CITIES=['الرياض','جدة','مكة المكرمة','المدينة المنورة','الدمام','الخبر','الظهران','الأحساء','القطيف','الجبيل','الطائف','تبوك','بريدة','حائل','خميس مشيط','أبها','نجران','جازان','ينبع','الخرج'];
function openLocation(){ renderLocation(); document.getElementById('locModal').classList.add('show'); }
function closeLocation(){ document.getElementById('locModal').classList.remove('show'); }
function pickCity(c){ if(view==='info') captureBookingInputs(); state.address.city=c; save(); closeLocation(); syncHeader(); if(view==='home') renderHome(); else if(view==='info') renderInfo(); }
function pickOther(){ const v=(document.getElementById('loc_other')||{}).value; if(v&&v.trim()){ pickCity(v.trim()); } else { toast('اكتب اسم المدينة'); } }
function detectCityGPS(){
  if(!navigator.geolocation){ toast('جهازك لا يدعم تحديد الموقع'); return; }
  toast('⏳ جارٍ تحديد موقعك...');
  navigator.geolocation.getCurrentPosition(function(pos){
    const lat=pos.coords.latitude.toFixed(6), lng=pos.coords.longitude.toFixed(6);
    state.address.lat=lat; state.address.lng=lng; state.address.mapUrl='https://www.google.com/maps?q='+lat+','+lng;
    save(); toast('تم تحديد موقعك بدقة ✅ — اختر مدينتك للتوصيل');
  }, function(){ toast('⚠️ اسمح بإذن الموقع أو اختر مدينتك يدوياً'); }, {enableHighAccuracy:true,timeout:12000});
}
function renderLocation(){
  const cur=(state.address&&state.address.city)||'';
  const cities=CITIES.map(c=>`<button class="${c===cur?'on':''}" onclick="pickCity('${c}')">${c}</button>`).join('');
  document.getElementById('locModal').innerHTML=`
    <div class="loc-sheet">
      <div class="loc-head"><b>📍 اختر موقعك</b><button onclick="closeLocation()">✕</button></div>
      <div class="hint">نوصلك بأقرب فني/مزوّد في منطقتك.</div>
      <button class="loc-gps" onclick="detectCityGPS()">📍 استخدم موقعي الحالي (GPS)</button>
      <div class="loc-cities">${cities}</div>
      <div class="loc-other"><input id="loc_other" placeholder="مدينة أخرى..." /><button onclick="pickOther()">تأكيد</button></div>
    </div>`;
}
/* شريط خطوات: ① الخدمة ② الوقت ③ بياناتك */
function stepBar(n){
  const labels=['الخدمة','الوقت','بياناتك'];
  return `<div class="steps">${labels.map((s,i)=>`<div class="step ${i+1===n?'active':''} ${i+1<n?'done':''}"><span class="sd">${i+1<n?'✓':ar(i+1)}</span>${s}</div>`).join('<span class="sline"></span>')}</div>`;
}

/* ---------- شرح برنامج الولاء (يظهر عند الضغط على الشريط) ---------- */
function showLoyaltyInfo(){
  const L=myLoyalty();
  const left=Math.max(0, LOYALTY_TARGET - L.progress);
  const prog=Array.from({length:LOYALTY_TARGET},(_,i)=>`<i class="${i<L.progress?'on':''}"></i>`).join('');
  const statusLine = (L.rewardAvailable && L.rewardAmount>0)
    ? `<div class="loy-eg" style="background:#e8f7ee;border-color:#0b7a3b;color:#0b7a3b"><b>🎉 مكافأتك جاهزة!</b><br>طلبك القادم يُخصم منه <b>${money(L.rewardAmount)}</b> (متوسط طلباتك).</div>`
    : (L.done>0
        ? `<div class="loy-eg"><b>تقدّمك:</b> أنجزت <b>${ar(L.progress)}</b> من <b>${ar(LOYALTY_TARGET)}</b> — باقي لك <b>${ar(left)}</b> ${left===1?'طلب':'طلبات'} للمكافأة.</div>`
        : `<div class="loy-eg">ابدأ أول طلب، وبعد <b>${ar(LOYALTY_TARGET)}</b> طلبات تجيك مكافأتك 🎁</div>`);
  const sheet=`<div class="loc-sheet">
    <div class="loc-head"><h3>🎁 برنامج الولاء</h3><button class="loc-x" onclick="closeLoyaltyInfo()">✕</button></div>
    <div class="loy-prog">${prog}</div>
    ${statusLine}
    <div class="loy-steps">
      <div class="loy-step"><div class="ls-n">١</div><div class="ls-t"><b>اطلب صيانتك عادي</b><span>كل طلب تُنجزه يُحتسب في رصيد ولائك.</span></div></div>
      <div class="loy-step"><div class="ls-n">٦</div><div class="ls-t"><b>بعد ٦ طلبات</b><span>تستحق مكافأة على طلبك السابع.</span></div></div>
      <div class="loy-step"><div class="ls-n">🎁</div><div class="ls-t"><b>خصم = متوسط طلباتك</b><span>يُخصم من طلبك السابع مبلغ = متوسط أسعار طلباتك الستة السابقة.</span></div></div>
    </div>
    <div class="loy-eg"><b>مثال:</b> لو متوسط طلباتك <b>١٥٠ ر.س</b>، وطلبك السابع بـ<b>٢٠٠ ر.س</b> → تدفع <b>٥٠ ر.س</b> فقط.</div>
    <div style="color:var(--muted);font-size:.82rem;margin-top:10px;line-height:1.7">💡 الخصم على أجرة اليد (الخدمة) فقط — قطع الغيار والأغراض تبقى على العميل بسعرها.</div>
    <button class="cta" style="margin-top:16px" onclick="closeLoyaltyInfo()">فهمت 👍</button>
  </div>`;
  const m=document.getElementById('locModal');
  m.innerHTML=sheet; m.classList.add('show');
}
function closeLoyaltyInfo(){ const m=document.getElementById('locModal'); m.classList.remove('show'); m.innerHTML=''; }

/* ---------- قائمة الأسعار (تفاعلية: اختر واطلب) ---------- */
function renderPrices(){
  quickMode=false;
  const sections=Object.keys(CATS).map(k=>{
    const c=CATS[k];
    const rows=SERVICES.filter(s=>s.cat===k).map(s=>{
      const sel=!!state.cart[s.id];
      return `<button class="price-row ${sel?'sel':''}" onclick="toggleService('${s.id}')">
        <span class="pr-check">${sel?'✓':''}</span>
        <span class="pr-name">${s.ico} ${s.name}</span>
        <span class="pr-dur">${fmtDuration(s.dur)}</span>
        <span class="pr-price">${s.custom?'بعد المعاينة':money(s.price)}</span>
      </button>`;
    }).join('');
    return `<div class="price-cat"><h3>${c.ico} ${c.name}</h3>${rows}</div>`;
  }).join('');
  const n=cartCount();
  const nextbar = n>0 ? `
    <div class="nextbar"><div class="wrap">
      <div class="nb-info"><b>${ar(n)} ${n===1?'خدمة':'خدمات'} · ${money(cartPrice())}</b><small>المدة التقريبية ${fmtDuration(cartDuration())}</small></div>
      <button class="nb-go" onclick="go('time')">التالي <span>←</span></button>
    </div></div>` : '';
  document.getElementById('app').innerHTML=`
    <div class="wrap screen" style="padding-bottom:100px">
      ${pageHead('💰 قائمة الأسعار','home')}
      <p style="color:var(--muted);text-align:center;margin-top:2px">اختر الخدمة اللي تحتاجها — الأسعار تقديرية وقد تختلف حسب المعاينة.</p>
      <div class="value-card">
        <div class="vc-head">✨ ليش خدمة خافِت تستاهل؟</div>
        <div class="vc-list">
          <div class="vc-item"><span class="vc-ic">👔</span><span>فنيّون نظيفون بمظهر لائق وتعامل محترم</span></div>
          <div class="vc-item"><span class="vc-ic">🏅</span><span>جودة عمل عالية ومتقنة</span></div>
          <div class="vc-item"><span class="vc-ic">🧹</span><span>ننظّف المكان بعد انتهاء العمل</span></div>
          <div class="vc-item"><span class="vc-ic">🛡️</span><span>ضمان على شغل اليد والقطع — لو رجعت المشكلة نرجع بلا تكلفة</span></div>
          <div class="vc-item"><span class="vc-ic">✅</span><span>أسعار واضحة، بلا مفاجآت بعد الشغل</span></div>
        </div>
      </div>
      ${sections}
    </div>
    ${nextbar}`;
}

let joinCtx=null;
function normJoinPhone(v){ let d=String(v||'').replace(/[^0-9]/g,''); if(d.startsWith('00')) d=d.slice(2); if(d.startsWith('0')) d='966'+d.slice(1); if(!d.startsWith('966')) d='966'+d; return '+'+d; }
async function submitProvider(){
  const g=id=>{const e=document.getElementById(id);return e?e.value.trim():'';};
  const name=g('pv_name'), phone=g('pv_phone'), pass=g('pv_pass');
  const cities=g('pv_cities').split(/[،,\n]+/).map(s=>s.trim()).filter(Boolean);
  const services=Array.from(document.querySelectorAll('.chips-pick input:checked')).map(c=>c.value);
  if(!name){ toast('اكتب الاسم'); return; }
  if(!phone){ toast('اكتب رقم الجوال'); return; }
  if(pass.length<6){ toast('كلمة المرور ٦ أحرف على الأقل'); return; }
  if(!cities.length){ toast('اكتب مدن الخدمة'); return; }
  if(!services.length){ toast('اختر نوع الخدمات'); return; }
  if(!cloudReady){ toast('لا يوجد اتصال — حاول بعد قليل'); return; }
  const e164=normJoinPhone(phone);
  joinCtx={ name, phone, pass, cities, services, note:g('pv_note'), e164, mode:'signup' };
  state.provider={ name, phone, cities, services, note:joinCtx.note }; save();
  const btn=document.querySelector('.cta'); if(btn){ btn.disabled=true; btn.textContent='⏳ نرسل رمز التحقق...'; }
  try{
    /* ينشئ حساب دخول (جوال + كلمة مرور) — Supabase يرسل رمز تحقق SMS تلقائياً */
    const { error }=await sb.auth.signUp({ phone:e164, password:pass });
    if(error){
      if(/already|registered|exists/i.test(error.message||'')){
        joinCtx.mode='existing';                       /* رقم له حساب (عميل سابق مثلاً) — نتحقق ثم نضبط كلمة المرور */
        const r2=await sb.auth.signInWithOtp({ phone:e164 });
        if(r2.error) throw r2.error;
      } else throw error;
    }
    renderJoinOtp('');
  }catch(e2){
    toast('تعذّر إرسال الرمز — تأكد من الرقم وحاول ثانية');
    if(btn){ btn.disabled=false; btn.textContent='✅ سجّل وفعّل حسابك'; }
  }
}
function renderJoinOtp(msg){
  document.getElementById('app').innerHTML=`
    <div class="wrap screen">
      ${pageHead('تأكيد الجوال','join')}
      <div class="panel" style="margin-top:20px;text-align:center">
        <div style="font-size:2.4rem">📲</div>
        <h3 style="margin-top:8px">أدخل رمز التحقق</h3>
        <p style="color:var(--muted);font-size:.9rem;margin-top:6px">أرسلنا رمزاً إلى ${esc(joinCtx.e164)}</p>

    if(error){ renderJoinOtp('❌ الرمز غير صحيح — حاول ثانية'); return; }

function detectLocation(){
  const el=document.getElementById('loc-status');
  const btn=document.querySelector('.loc-btn');

  if(btn) btn.classList.add('busy');
  navigator.geolocation.getCurrentPosition(function(pos){
    const lat=pos.coords.latitude.toFixed(6), lng=pos.coords.longitude.toFixed(6);
    state.address.lat=lat; state.address.lng=lng;
    state.address.mapUrl='https://www.google.com/maps?q='+lat+','+lng;
    save();
    if(btn){ btn.classList.remove('busy'); btn.classList.add('set');
      const b=btn.querySelector('b'), s=btn.querySelector('small');
      if(b) b.textContent='✓ موقعك محدّد'; if(s) s.textContent='تقدر تحدّثه لو تغيّر';
    }
    if(el) el.innerHTML=locOkHtml();
    toast('تم تحديد موقعك ✅');
    reverseGeocodeCity(lat,lng);   // استنتج المدينة من الموقع (لتوزيع المزوّدين) — بصمت
  }, function(err){
    if(btn) btn.classList.remove('busy');
    if(el) el.innerHTML='<div class="loc-err">⚠️ ما قدرنا نحدد موقعك. اسمح بإذن الموقع، أو اكتب العنوان تحت.</div>';
  }, {enableHighAccuracy:true, timeout:12000, maximumAge:0});
}
// استنتاج اسم المدينة من الإحداثيات (اختياري — لتوزيع الطلب على مزوّدي نفس المدينة)
async function reverseGeocodeCity(lat,lng){
  try{
    const r=await fetch('https://nominatim.openstreetmap.org/reverse?format=jsonv2&accept-language=ar&zoom=10&lat='+lat+'&lon='+lng);
    if(!r.ok) return;
    const j=await r.json(); const ad=j&&j.address;
    const city = ad && (ad.city||ad.town||ad.village||ad.county||ad.state);
    if(city){ state.address.city=city; save(); }
  }catch(e){/* تجاهل بصمت */}
}
function pickDate(iso){
  // يحمي «التاريخ الأبعد» كمان — لأن تقويم الجهاز يسمح باختيار أي يوم
  if(isOffDay(iso)){ toast('يوم '+AR_DAYS[parseISO(iso).getDay()]+' إجازة — اختر يوماً آخر'); return; }
  state.booking.date=iso; state.booking.time=null; renderTime();
}
function pickTime(min){ state.booking.time=min; renderTime(); }
function toggleWantsEarlier(){ state.booking.wantsEarlier = state.booking.wantsEarlier===false; renderTime(); }
// يبحث عن أبكر موعد متاح قبل موعد الطلب الحالي (يظهر إذا ألغى عميل ثاني وفرّغ وقت)
function earlierSlotFor(o){
  if(!o || o.status==='cancelled' || o.status==='done') return null;
  const need = o.duration || 60;
  const curKey = o.date + String(o.startMin).padStart(4,'0');
  const today=new Date(); today.setHours(0,0,0,0);
  for(let i=0;i<30;i++){
    const d=new Date(today); d.setDate(today.getDate()+i); const iso=dateISO(d);
    if(iso > o.date) break;                       // ما نتجاوز موعده الحالي
    for(let t=WORK_START;t+need<=WORK_END;t+=ARRIVAL_WINDOW){
      if(iso+String(t).padStart(4,'0') >= curKey) break;   // وصلنا موعده أو بعده
      if(slotAvailable(iso,t,need,o.id)) return {date:iso,time:t};
    }
  }
  return null;
}
// كم دقيقة متوقّع يتأخر هذا الموعد بسبب طلبات قبله بنفس اليوم أضاف لها الفني وقت إضافي
function expectedDelayFor(o){
  if(!o || o.status==='done' || o.status==='cancelled') return 0;
  return state.orders
    .filter(x=> x.id!==o.id && x.date===o.date && x.status!=='cancelled' && x.status!=='done' && x.startMin<=o.startMin)
    .reduce((a,x)=>a+(x.delayMin||0),0);
}
async function advanceOrder(id){
  const o=state.orders.find(x=>x.id===id); if(!o) return;
  const e=earlierSlotFor(o);
  if(!e){ toast('ما عاد فيه موعد أبكر متاح'); render(); return; }
  if(!confirm('تقديم موعدك إلى '+dayLabel(e.date)+' · '+windowLabel(e.time)+'؟')) return;
  o.date=e.date; o.startMin=e.time; o.endMin=e.time+(o.duration||60);
  save();
  cloudPatch(o.dbId,{service_date:o.date, start_min:o.startMin, end_min:o.endMin});
  toast('تم تقديم موعدك ✅');
  render();
}

function renderTime(){
  if(!quickMode && cartCount()===0){ go('home'); return; }
  // حدّث الجدول المشغول الحقيقي — لو تغيّر أعد رسم المواعيد
  loadBusy().then(ch=>{ if(ch && view==='time') render(); });
  const b=state.booking;
  const today=new Date(); today.setHours(0,0,0,0);
  const need0=scheduleDuration();
  // افتراضياً: أقرب يوم فيه وقت متاح فعلاً
  if(!b.date){
    for(let i=0;i<14;i++){ const d=new Date(today); d.setDate(today.getDate()+i); const iso=dateISO(d);
      let has=false; for(let tt=WORK_START;tt+need0<=WORK_END;tt+=ARRIVAL_WINDOW){ if(slotAvailable(iso,tt,need0)){has=true;break;} }
      if(has){ b.date=iso; break; } }
    if(!b.date) b.date=dateISO(today);
  }
  // نتخطّى أيام الإجازة تماماً — ما تظهر بالشريط
  const days=[]; for(let i=0;i<16;i++){ const d=new Date(today); d.setDate(today.getDate()+i);
    if(!OFF_DAYS.includes(d.getDay())) days.push(d); }
  const dchips=days.map(d=>{
    const iso=dateISO(d), isToday=i0(d,today), active=b.date===iso;
    const early = !quickMode && daysUntil(iso) >= ADVANCE_DAYS;   // مؤهّل لخصم الحجز المبكر
    return `<button class="dchip ${active?'active':''}" onclick="pickDate('${iso}')" style="position:relative">
      ${early?`<span style="position:absolute;top:-7px;left:-4px;background:#0b7a3b;color:#fff;font-size:.6rem;font-weight:900;padding:2px 5px;border-radius:7px;line-height:1">٥٪-</span>`:''}
      <small>${isToday?'اليوم':AR_DAYS[d.getDay()]}</small><b>${ar(d.getDate())}</b><span class="mon">${AR_MONTHS[d.getMonth()]}</span></button>`;
  }).join('');
  // مربع «تاريخ أبعد» — تقويم لاختيار أي يوم (بعد أسبوعين، شهر...)
  const farActive = b.date && !days.some(d=>dateISO(d)===b.date);
  const fd = farActive ? parseISO(b.date) : null;
  const farChip = `<label class="dchip more-date ${farActive?'active':''}">
    ${farActive
      ? `<small>${AR_DAYS[fd.getDay()]}</small><b>${ar(fd.getDate())}</b><span class="mon">${AR_MONTHS[fd.getMonth()]}</span>`
      : `<small>📅</small><b>＋</b><span class="mon">تاريخ أبعد</span>`}
    <input type="date" min="${dateISO(today)}" value="${farActive?b.date:''}" onchange="if(this.value)pickDate(this.value)" />
  </label>`;

  const need=scheduleDuration();
  const slots=[];
  for(let t=WORK_START;t+need<=WORK_END;t+=ARRIVAL_WINDOW){
    const ok=slotAvailable(b.date,t,need), active=b.time===t;
    slots.push(`<button class="slot win ${active?'active':''}" ${ok?'':'disabled'} onclick="pickTime(${t})">${windowLabel(t)}</button>`);
  }
  const anyFree=slots.some(s=>!s.includes('disabled'));
  const ready=b.time!=null;
  const we=state.booking.wantsEarlier!==false;

  document.getElementById('app').innerHTML=`
    <div class="wrap screen" style="padding-bottom:100px">
      ${pageHead('متى يناسبك؟', quickMode?'home':'pick')}
      ${stepBar(2)}
      ${quickMode?'':`<div class="flow-sum" style="margin-top:14px">⏱️ <span>المدة المتوقعة لطلبك: <b>${fmtDuration(need)}</b> — نحجز لك الفترة كاملة مع احتياط تنقّل، فلا نتأخر عليك ولا على من بعدك.</span></div>`}
      <div class="notify-toggle ${we?'on':''}" style="margin-top:14px" onclick="toggleWantsEarlier()">
        <span class="nt-check">${we?'✓':''}</span>
        <span class="nt-t"><b>🔔 بلّغوني لو صار موعد أبكر</b><small>لو أحد ألغى وصار وقت أقرب، نتواصل معك ونقدّم موعدك</small></span>
      </div>
      ${quickMode?'':`<div class="panel" style="margin-top:14px;background:#e8f7ee;border-color:#0b7a3b">
        <div style="display:flex;gap:10px;align-items:center">
          <span style="font-size:1.6rem">📅</span>
          <div><b style="color:#0b7a3b;display:block">وفّر ٥٪ بالحجز المبكر</b>
          <small style="color:var(--muted)">أي موعد بعد <b>٥ أيام</b> أو أكثر — الخصم يُطبّق تلقائياً على الأيام المعلّمة <span style="background:#0b7a3b;color:#fff;font-size:.62rem;font-weight:900;padding:1px 5px;border-radius:6px">٥٪-</span></small></div>
        </div></div>`}
      <div class="panel" style="margin-top:14px"><h3>📅 اختر اليوم</h3><div class="dates">${dchips}${farChip}</div></div>
      <div class="panel" id="slotsPanel"><h3>🕐 اختر نافذة الوصول</h3>
        ${anyFree?`<div class="slots">${slots.join('')}</div>`:`<p style="color:var(--muted)">لا توجد أوقات متاحة في هذا اليوم، جرّب يوماً ثاني.</p>`}
        <div class="slot-note">💡 <span>تختار <b>نافذة وصول</b> (ساعتين) والفني يوصلك خلالها — أدق وأريح للطرفين، وما يتأخر عليك لو طال الطلب اللي قبلك.</span></div>
      </div>
    </div>
    <div class="nextbar"><div class="wrap">
      <div class="nb-info"><b>${ready?windowLabel(b.time):'🕐 اختر نافذة الوصول'}</b><small>${dayLabel(b.date)}</small></div>
      <button class="nb-go${ready?'':' need'}" onclick="nextFromTime()">التالي <span>←</span></button>
    </div></div>`;
}

/* ---------- كود الخصم ---------- */
/* التحقّق من كود الإحالة يصير في *الخادم* — المتصفح ما يقرّر خصماً.
   يرجع سبباً واضحاً: كود غلط / كودك أنت / مو أول طلب. */
let refCheck={ code:'', ok:false, reason:'', busy:false };
const REF_MSG={
  unknown: '❌ الكود غير صحيح',
  self:    '❌ ما تقدر تستخدم كودك أنت',
  not_new: 'ℹ️ الخصم لأول طلب فقط — وأنت عميل عندنا من قبل 🙏',
  not_signed_in: '❌ تعذّر التحقق، حدّث الصفحة',
  network: '⚠️ تعذّر التحقق — تأكد من الإنترنت وحاول ثانية'
};
async function setPromo(v){
  state.promo=(v||'').trim();
  captureBookingInputs();
  if(!state.promo){ refCheck={code:'',ok:false,reason:'',busy:false}; renderInfo(); return; }
  refCheck={ code:state.promo, ok:false, reason:'', busy:true }; renderInfo();
  try{
    if(!myUid) await ensureAnonSession();
    const { data, error } = await sb.rpc('check_referral', { p_code: state.promo });
    if(error) throw error;
    refCheck={ code:state.promo, ok:!!(data&&data.ok), reason:(data&&data.reason)||'', busy:false };
  }catch(e){ console.warn('ref check:', e.message||e);
    // فشل الاتصال ≠ كود خاطئ — نميّزهما فلا نتّهم كود العميل ظلماً
    refCheck={ code:state.promo, ok:false, reason:'network', busy:false }; }
  renderInfo();
}

/* ---------- خريطة اختيار الموقع (Leaflet + OpenStreetMap) ---------- */
let _pmap=null, _pmarker=null;
function ensureMarker(lat,lng){
  if(!_pmap) return;
  if(_pmarker){ _pmarker.setLatLng([lat,lng]); }
  else{
    _pmarker=L.marker([lat,lng],{draggable:true}).addTo(_pmap);
    _pmarker.on('dragend',()=>{ const p=_pmarker.getLatLng(); setPin(p.lat,p.lng); });
  }
}
function initPickMap(){
  const el=document.getElementById('pickmap'); if(!el) return;
  if(!window.L){ setTimeout(initPickMap,300); return; }   // انتظر تحميل مكتبة الخريطة
  const a=state.address;
  const hasLoc=!!(a.lat&&a.lng);
  const lat=hasLoc?+a.lat:26.2794, lng=hasLoc?+a.lng:50.2083;   // افتراضي: الخبر
  if(_pmap){ try{_pmap.remove();}catch(e){} _pmap=null; _pmarker=null; }
  _pmap=L.map(el,{zoomControl:true}).setView([lat,lng], hasLoc?16:12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(_pmap);
  if(hasLoc) ensureMarker(lat,lng);
  _pmap.on('click',(e)=>{ ensureMarker(e.latlng.lat,e.latlng.lng); setPin(e.latlng.lat,e.latlng.lng); });
  setTimeout(()=>{ try{_pmap.invalidateSize();}catch(e){} },220);   // إصلاح حجم الخريطة بعد الرسم
}
function setPin(lat,lng){
  const la=(+lat).toFixed(6), ln=(+lng).toFixed(6);
  state.address.lat=la; state.address.lng=ln;
  state.address.mapUrl='https://www.google.com/maps?q='+la+','+ln;
  save();
  const st=document.getElementById('loc-status'); if(st) st.innerHTML=locOkHtml();
  const ast=document.getElementById('acc-loc-status'); if(ast) ast.innerHTML=accLocOkHtml();   // صفحة الحساب
  reverseGeocodeCity(la,ln);
}
function locateMe(){
  if(!navigator.geolocation){ toast('جهازك ما يدعم تحديد الموقع'); return; }
  toast('⏳ جارٍ تحديد موقعك...');
  navigator.geolocation.getCurrentPosition(function(pos){
    const lat=pos.coords.latitude, lng=pos.coords.longitude;
    if(_pmap){ _pmap.setView([lat,lng],17); ensureMarker(lat,lng); }
    setPin(lat,lng); toast('تم تحديد موقعك ✅ — تقدر تعدّله بسحب الدبوس');
  }, function(){ toast('اسمح بإذن الموقع أو اضغط على الخريطة يدوياً'); }, {enableHighAccuracy:true,timeout:12000,maximumAge:0});
}

let lastOrderId=null;
async function confirmOrder(){
  captureBookingInputs();
  const c=state.customer,a=state.address,b=state.booking;
  if(!c.name){ toast('اكتب الاسم من فضلك'); return; }
  if(!c.phone){ toast('اكتب رقم الجوال'); return; }
  if(!(a.lat&&a.lng) && !a.house){ toast('حدّد موقعك على الخريطة أو اكتب رقم المنزل'); return; }
  if(!b.date||b.time==null){ toast('اختر اليوم والوقت'); return; }

  const items = quickMode
    ? [{id:'quick', name:'طلب سريع (معاينة)', ico:'⚡', qty:1, dur:scheduleDuration(), price:0, custom:true}]
    : cartItems().map(i=>({id:i.id,name:i.name,ico:i.ico,qty:i.qty,dur:i.dur,price:i.price,custom:!!i.custom}));
  const loyDisc = quickMode ? 0 : loyaltyDiscFor();
  const duration=scheduleDuration();
  const note=(state.problem&&state.problem.desc)||'';
  const promoCodeIn=(document.getElementById('f_promo')||{}).value ? document.getElementById('f_promo').value.trim() : (state.promo||'');
  // الخصم والرصيد والولاء يُعاد حسابهم في الخادم — هذي بس للعرض
  const discPct = (loyDisc>0 || !refCheck.ok) ? 0 : 10;
  const afterDisc = Math.max(0, Math.round(cartPrice()*(1-discPct/100)) - loyDisc);
  const creditUse = quickMode ? 0 : Math.min(myRef.balance||0, afterDisc);
  const videoFile=(document.getElementById('f_video')||{}).files;
  const houseFile=(document.getElementById('f_housePhoto')||{}).files;

  const btn=document.querySelector('.cta'); if(btn){ btn.disabled=true; btn.textContent='⏳ جارٍ الإرسال...'; }

  // ارفع المقطع (إن وُجد) إلى Supabase Storage
  let videoUrl='';
  if(videoFile && videoFile[0]){
    if(cloudReady){
      if(btn) btn.textContent='⏳ جارٍ رفع المقطع...';
      try{ videoUrl=await uploadVideo(videoFile[0]); }
      catch(e){ toast('تعذّر رفع المقطع، بنكمّل الطلب بدونه'); }
    } else {
      toast('رفع المقطع يحتاج اتصال بالخادم — بنكمّل بدونه');
    }
    if(btn) btn.textContent='⏳ جارٍ الإرسال...';
  }
  // ارفع صورة المنزل (إن وُجدت) — تُخزَّن داخل العنوان
  if(houseFile && houseFile[0] && cloudReady){
    if(btn) btn.textContent='⏳ جارٍ رفع صورة المنزل...';
    try{ a.photoUrl=await uploadVideo(houseFile[0]); }
    catch(e){ toast('تعذّر رفع صورة المنزل، بنكمّل بدونها'); }
    if(btn) btn.textContent='⏳ جارٍ الإرسال...';
  }

  const base={
    createdAt:Date.now(), items, customer:{...c}, address:{...a},
    date:b.date, startMin:b.time, duration, endMin:b.time+duration,
    price: quickMode?0:cartPrice(),
    finalPrice: quickMode?0:Math.max(0, afterDisc - creditUse),
    referredBy: (discPct>0 ? promoCodeIn : ''), creditUsed: creditUse,
    loyaltyDisc: loyDisc,
    free:false, status:'new', rating:0, reminded:false, quick:quickMode, note, videoUrl, wantsEarlier: state.booking.wantsEarlier!==false,
    promoCode: discPct>0?promoCodeIn:'', discountPct: discPct,
  };
  let order=null;
  if(cloudReady){
    try{ order=await cloudInsert(base); }
    catch(e){
      // اطبع السبب كامل — لا تبتلعه بصمت
      console.error('❌ فشل حفظ الطلب في الخادم:', {
        message: e && e.message, code: e && e.code,
        details: e && e.details, hint: e && e.hint, raw: e
      });
      toast('⚠️ ما وصل الطلب — أعد المحاولة');
    }
  }
  if(!order){ state.seq++; order=Object.assign({id:'#'+ar(state.seq), num:state.seq, dbId:null}, base); }
  state.orders.unshift(order);
  state.myOrderIds=(state.myOrderIds||[]); state.myOrderIds.push(order.id);
  state.cart={}; state.booking={date:null,time:null}; state.problem={desc:''}; state.promo=''; quickMode=false;
  save(); lastOrderId=order.id; go('confirm');
}

const STATUS_AR={new:'قيد المراجعة',confirmed:'مؤكد',progress:'قيد التنفيذ',done:'مكتمل',cancelled:'ملغي'};
const STATUS_CLS={new:'st-new',confirmed:'st-confirmed',progress:'st-progress',done:'st-done',cancelled:'st-cancelled'};
function renderMyBookings(){

        <div class="oh"><div><b>${o.id}</b><div class="oitems">${itemsList}</div></div><span class="status ${STATUS_CLS[o.status]}">${STATUS_AR[o.status]}</span></div>
        <div class="ometa">

function printInvoiceDoc(o){
  const inv=o.invoice||{items:[],total:0};
  const rows=(inv.items||[]).map(it=>`<tr><td>${esc(it.name)}</td><td>${ar(it.qty||1)}</td><td>${money(+it.price||0)}</td><td>${money((+it.price||0)*(+it.qty||1))}</td></tr>`).join('');
  const d=new Date(); const ds=ar(d.getDate())+'/'+ar(d.getMonth()+1)+'/'+ar(d.getFullYear());
  const html='<!doctype html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>فاتورة '+o.id+'</title>'
   +'<style>body{font-family:Cairo,system-ui,Arial,sans-serif;padding:24px;color:#141414;max-width:520px;margin:0 auto}'
   +'.h{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #F5C518;padding-bottom:12px}'
   +'.h .b{font-size:1.5rem;font-weight:900}.h .b span{background:#F5C518;padding:2px 10px;border-radius:8px}'
   +'.meta{color:#555;font-size:.9rem;margin:12px 0}.meta div{margin:3px 0}'
   +'table{width:100%;border-collapse:collapse;margin-top:8px}th,td{text-align:right;padding:9px 6px;border-bottom:1px solid #eee;font-size:.92rem}'
   +'th{background:#FBF3D0;font-weight:800}.tot{display:flex;justify-content:space-between;font-weight:900;font-size:1.2rem;margin-top:14px;border-top:2px solid #141414;padding-top:10px}'
   +'.ft{margin-top:22px;text-align:center;color:#888;font-size:.85rem}@media print{.noprint{display:none}}</style></head><body>'
   +'<div class="h"><div class="b">🔧 <span>'+BRAND+'</span></div><div style="text-align:left"><b>فاتورة</b><br>'+o.id+'</div></div>'
   +'<div class="meta"><div>العميل: '+esc(o.customer.name)+' · '+esc(o.customer.phone)+'</div><div>التاريخ: '+ds+'</div></div>'
   +'<table><thead><tr><th>الخدمة</th><th>العدد</th><th>السعر</th><th>الإجمالي</th></tr></thead><tbody>'+rows+'</tbody></table>'
   +'<div class="tot"><span>الإجمالي</span><span>'+money(inv.total||0)+'</span></div>'
   +'<div class="ft">شكراً لتعاملك مع '+BRAND+' · '+PHONE+'</div>'
   +'<div class="noprint" style="text-align:center;margin-top:18px"><button onclick="print()" style="padding:10px 22px;font-weight:800;border:none;background:#141414;color:#fff;border-radius:10px;cursor:pointer">🖨️ طباعة</button></div>'
   +'</body></html>';
  const w=window.open('','_blank'); if(!w){ toast('اسمح بالنوافذ المنبثقة للطباعة'); return; } w.document.write(html); w.document.close();
}
function rate(id,n){ const o=state.orders.find(x=>x.id===id); if(!o||o.rating) return; o.rating=n; save(); cloudPatch(o.dbId,{rating:n}); toast('شكراً لتقييمك '+'⭐'.repeat(n)); render(); }
function saveFeedback(id, btn){
  const o=state.orders.find(x=>x.id===id); if(!o) return;
  const ta = btn && btn.parentElement ? btn.parentElement.querySelector('textarea') : null;
  const val = ta ? ta.value.trim() : '';
  if(!val){ toast('اكتب رسالتك أولاً'); return; }
  if(o.feedback){ return; }   // مقفلة — ما تتغيّر بعد الإرسال
  o.feedback=val; save(); cloudPatch(o.dbId,{feedback:val}); toast('شكراً — وصلتنا رسالتك 🌟'); render();
}

/* ---- مكوّنات مشتركة ---- */
function pageHead(title,backTo){ return `<div class="pagehead"><button class="back" onclick="go('${backTo}')" title="رجوع">→</button><h2>${title}</h2></div>`; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
let toastTimer;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2600); }

render();  // تُعرض الصفحة فوراً بدون انتظار أي شيء خارجي
// تُحمّل السحابة بالخلفية بعد جاهزية مكتبة Supabase (لا تعطّل فتح الصفحة)
if(window.supabase) initCloud();
else window.addEventListener('load', initCloud);
</script>
</body>
</html>
